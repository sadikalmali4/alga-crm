<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alga CRM — Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f9fafb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.kart{background:white;border-radius:16px;padding:40px 32px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{width:56px;height:56px;background:#7ab528;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.logo-icon svg{width:28px;height:28px;fill:white;}
h1{font-size:22px;font-weight:600;color:#1f2937;}
p{font-size:13px;color:#9ca3af;margin-top:4px;}
.f{margin-bottom:14px;}
.f label{display:block;font-size:12px;font-weight:500;color:#4b5563;margin-bottom:5px;}
.f input{width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.f input:focus{border-color:#7ab528;}
.btn{width:100%;padding:12px;background:#7ab528;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px;}
.btn:hover{background:#5f8e1f;}
.hata{font-size:12px;color:#e02424;margin-top:10px;text-align:center;display:none;}
.admin-link{text-align:center;margin-top:16px;font-size:13px;color:#9ca3af;}
.admin-link a{color:#7ab528;text-decoration:none;font-weight:500;}
</style>
</head>
<body>
<div class="kart">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
    <h1>Alga CRM</h1>
    <p>Saha satış takip sistemi</p>
  </div>
  <div class="f"><label>E-posta</label><input type="email" id="email" placeholder="ad@alga.com.tr" autocomplete="email"/></div>
  <div class="f"><label>Şifre</label><input type="password" id="sifre" placeholder="••••••••" autocomplete="current-password"/></div>
  <button class="btn" id="btn" onclick="giris()">Giriş Yap</button>
  <p class="hata" id="hata"></p>
  <div class="admin-link"><a href="/alga-crm/admin.html">Yönetici paneli →</a></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://rbcofacflhkrquhefqzj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJiY29mYWNmbGhrcnF1aGVmcXpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODE1MjIsImV4cCI6MjA5MTk1NzUyMn0.iFFJWiR8d9ICFOD0mxBHKK8KAhmDowc-6n02461q3eQ'
);

sb.auth.onAuthStateChange((event, session) => {
  if (session) window.location.href = '/alga-crm/harita.html';
});

async function giris() {
  const email = document.getElementById('email').value.trim();
  const sifre = document.getElementById('sifre').value;
  const btn = document.getElementById('btn');
  const hata = document.getElementById('hata');
  
  if (!email || !sifre) { gosterHata('E-posta ve şifre gerekli'); return; }
  
  btn.textContent = 'Giriş yapılıyor...';
  hata.style.display = 'none';
  
  const { data, error } = await sb.auth.signInWithPassword({ email, password: sifre });
  
  if (error) {
    btn.textContent = 'Giriş Yap';
    gosterHata('Hatalı e-posta veya şifre');
    return;
  }
  
  window.location.href = '/alga-crm/harita.html';
}

function gosterHata(m) {
  const el = document.getElementById('hata');
  el.textContent = m;
  el.style.display = 'block';
}

document.getElementById('sifre').addEventListener('keydown', e => {
  if (e.key === 'Enter') giris();
});
</script>
</body>
</html>
